# Lead Automation Configuration
# ================================

# API Keys (loaded from environment variables in production)
api_keys:
  google_maps: ${GOOGLE_MAPS_API_KEY}
  apollo: ${APOLLO_API_KEY}
  anthropic: ${ANTHROPIC_API_KEY}
  serpapi: ${SERPAPI_API_KEY}

# Google Sheets CRM
google_sheets:
  spreadsheet_id: "1ZdhkP_Hq-340eVEOS-RKwHGjDaX0vNVP6vO48XzkOx8"
  credentials_file: "config/google_credentials.json"
  sheet_name: "AEC Leads"

# Lead Sourcing Settings
lead_sourcing:
  daily_target: 50  # Number of leads to find per day
  apollo_credit_budget: 200  # Max Apollo enrichment credits per run (0 = unlimited)

  # Target cities (US metros with strong AEC / development activity)
  target_cities:
    - name: "New York"
      country: "US"
    - name: "Los Angeles"
      country: "US"
    - name: "Miami"
      country: "US"
    - name: "Chicago"
      country: "US"
    - name: "Austin"
      country: "US"
    - name: "San Francisco"
      country: "US"
    - name: "Boston"
      country: "US"
    - name: "Atlanta"
      country: "US"
    - name: "Denver"
      country: "US"
    - name: "Seattle"
      country: "US"
    - name: "Phoenix"
      country: "US"
    - name: "Dallas"
      country: "US"
    - name: "Houston"
      country: "US"
    - name: "Philadelphia"
      country: "US"
    - name: "San Diego"
      country: "US"

  # Search queries for finding AEC professional services firms
  search_queries:
    - "civil engineering firm"
    - "structural engineering firm"
    - "MEP engineering firm"
    - "environmental consulting firm"
    - "architecture firm"
    - "geotechnical engineering firm"
    - "land surveying company"
    - "environmental remediation company"
    - "engineering consulting firm"

  # Exclude keywords (mega-firms too large for our ICP, institutions)
  exclude_keywords:
    - "AECOM"
    - "Jacobs"
    - "WSP"
    - "Arcadis"
    - "Stantec"
    - "Kimley-Horn"
    - "HDR"
    - "Gensler"
    - "university"
    - "college"
    - "government"

# Email Settings
email:
  sender_name: "Zelu Sottomayor"
  sender_email: "zelu@zelusottomayor.com"

  # Sending limits
  daily_limit: 50
  delay_between_emails_seconds: 120  # 2 minutes between emails

  # Send window (in sender's timezone)
  send_start_hour: 9
  send_end_hour: 17

  # Days to send (0=Monday, 6=Sunday)
  send_days: [0, 1, 2, 3, 4]  # Monday to Friday

# Instantly.ai Settings
instantly:
  api_key: ${INSTANTLY_API_KEY}
  campaign_name: "AEC Business Development"

# Email Personalization
personalization:
  model: "claude-sonnet-4-20250514"
  max_tokens: 500

  # Your value proposition for the AI to use
  value_proposition: |
    I build managed business development systems for engineering and architecture
    firms. The system identifies potential clients (developers, property owners,
    GCs, facilities managers), researches them, writes personalized introductions,
    and delivers warm conversations — so your principals can focus on winning work
    and delivering projects, not prospecting. This very email is proof it works.

  # Sender bio for context
  sender_bio: |
    Zelu Sottomayor builds managed business development systems for AEC firms.
    He helps engineering and architecture practices generate a steady pipeline
    of new client introductions without pulling principals away from billable
    work or relying solely on referrals and RFPs.

# Local Services Pipeline (separate from AEC outreach)
# ICP: Businesses with automatable pain, budget for custom AI/automation, and phone-reachable decision-makers
local_services:
  sheet_name: "Local Services"
  daily_target: 50
  max_per_query: 5

  target_metros:
    - name: "New York"
      state: "NY"
    - name: "Los Angeles"
      state: "CA"
    - name: "Chicago"
      state: "IL"
    - name: "Dallas"
      state: "TX"
    - name: "Houston"
      state: "TX"
    - name: "Atlanta"
      state: "GA"
    - name: "Miami"
      state: "FL"
    - name: "Phoenix"
      state: "AZ"
    - name: "Denver"
      state: "CO"
    - name: "Charlotte"
      state: "NC"

  verticals:
    recruiting:
      queries: ["staffing agency", "recruiting firm", "employment agency", "headhunter", "talent acquisition firm"]
      exclude: ["temp labor", "day labor"]
    real_estate:
      queries: ["real estate brokerage", "realty group", "real estate office", "real estate company"]
      exclude: ["commercial real estate", "real estate investment"]
    logistics:
      queries: ["freight broker", "logistics company", "trucking company", "freight forwarding", "shipping broker"]
      exclude: ["international freight", "ocean freight"]
    property_management:
      queries: ["property management company", "property management", "rental management company", "HOA management"]
      exclude: ["self storage"]
    insurance:
      queries: ["insurance agency", "insurance broker", "independent insurance agent", "insurance office"]
      exclude: []

# B2B Startups Pipeline (signal-based sourcing → SaaS companies)
# ICP: B2B SaaS companies 5-50 employees, hiring or have sales roles
startups:
  sheet_name: "B2B Startups"
  daily_target: 25
  apollo_credit_budget: 50
  serpapi_budget_per_run: 30
  apollo_search_pages: 5  # pages per Apollo search (5 results/page)

  instantly:
    campaign_name: "B2B Startups Outbound"

  personalization:
    value_proposition: |
      I build automated outbound systems for B2B companies. The system
      finds your ideal prospects, researches them, writes personalized
      emails, sends sequences, and follows up — no SDRs, no VAs, no
      manual work. This very email is proof it works.
    sender_bio: |
      Max at Zelu Sottomayor builds automated outbound systems for B2B
      startups and growth-stage companies. He helps teams generate a steady
      pipeline of qualified conversations without hiring SDRs or doing
      manual prospecting.

  # Job titles to search for (Apollo org hiring + people search)
  sales_job_titles:
    - "SDR"
    - "BDR"
    - "Sales Development Representative"
    - "Business Development Representative"
    - "Account Executive"
    - "Inside Sales Representative"
    - "Inside Sales"

  # SerpAPI hiring signal queries (Google Jobs)
  hiring_queries:
    - "SDR"
    - "BDR"
    - "Sales Development Representative"
    - "Business Development Representative"
    - "outbound sales representative"

  # Locations for searches
  target_locations:
    - "United States"
    - "New York"
    - "San Francisco"
    - "Austin"
    - "Boston"

  # Apollo organization search locations
  apollo_locations:
    - "United States"

  # Employee count filter
  min_employees: 5
  max_employees: 50

  # B2B SaaS industry whitelist (must match at least one)
  b2b_industries:
    - "information technology & services"
    - "computer software"
    - "internet"
    - "financial services"
    - "logistics & supply chain"
    - "telecommunications"
    - "computer & network security"
    - "computer networking"

  # Industry blacklist (auto-reject)
  exclude_industries:
    - "hospital & health care"
    - "medical devices"
    - "medical practice"
    - "health, wellness & fitness"
    - "staffing & recruiting"
    - "marketing & advertising"
    - "retail"
    - "food & beverages"
    - "restaurants"
    - "education management"
    - "higher education"
    - "government administration"
    - "real estate"
    - "construction"
    - "professional training & coaching"
    - "wholesale"
    - "facilities services"
    - "consumer services"
    - "consumer goods"
    - "hospitality"

  # Keyword-based pass (if ANY keyword found in company data, pass even if industry is ambiguous)
  b2b_keywords:
    - "saas"
    - "b2b"
    - "software"
    - "platform"
    - "api"
    - "cloud"
    - "enterprise"
    - "automation"

  # Exclude large/enterprise companies
  exclude_companies:
    - "Google"
    - "Amazon"
    - "Microsoft"
    - "Meta"
    - "Salesforce"
    - "Cisco"
    - "Oracle"
    - "IBM"
    - "SAP"
