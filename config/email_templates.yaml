# Email Templates for Cold Outreach
# ==================================
# These templates use placeholders that get filled by Claude AI
# for maximum personalization.
#
# Focus: Managed BD systems for AEC professional services firms

sequences:
  default:
    name: "AEC Business Development Sequence"
    emails:
      # Email 1: Initial Outreach (Day 0)
      - step: 1
        delay_days: 0
        subject_options:
          - "New project pipeline for {{company_name}}"
          - "{{first_name}}, quick question about your pipeline"
          - "How {{company_name}} could win more private-sector work"
        body_template: |
          Hi {{first_name}},

          {{personalized_opener}}

          Here's the thing: this email found {{company_name}}, researched your firm,
          wrote itself, and landed in your inbox — all automatically.

          That's what I build for engineering and architecture firms: a managed
          business development system. It identifies potential clients, writes
          personalized introductions, sends them, and follows up — so your
          principals can focus on delivery, not prospecting.

          Think of it as having a dedicated BD coordinator filling your pipeline,
          for a fraction of the cost of a full-time hire.

          {{specific_pain_point}}

          If you're open to seeing how this would work for {{company_name}},
          grab 20 minutes here: https://zelusottomayor.com/book-call

          Best,
          Ze Lu Sottomayor

      # Email 2: Follow-up (Day 3)
      - step: 2
        delay_days: 3
        subject_options:
          - "Re: New project pipeline for {{company_name}}"
        body_template: |
          Hi {{first_name}},

          Quick follow-up.

          {{specific_pain_point}}

          The short version of what we do: we build outbound systems that run
          in the background so your team doesn't have to spend time on prospecting.
          You get leads researched, contacted, and followed up with — automatically.

          If you're curious about how it works, here's a short video walkthrough:
          https://zelusottomayor.com/demo

          What are your thoughts on this?

          Best,
          Ze Lu Sottomayor

      # Email 3: Value Add (Day 7)
      - step: 3
        delay_days: 7
        subject_options:
          - "Re: New project pipeline for {{company_name}}"
        body_template: |
          Hi {{first_name}},

          One more thought —

          {{industry_specific_insight}}

          Most firms I work with rely on referrals and word-of-mouth for
          new business. Both work, but neither is proactive — you're
          always waiting for the phone to ring.

          A system that runs in the background means your pipeline
          doesn't depend on timing or luck.

          Happy to walk you through it: https://zelusottomayor.com/book-call

          Best,
          Ze Lu Sottomayor

      # Email 4: Breakup (Day 12)
      - step: 4
        delay_days: 12
        subject_options:
          - "Closing the loop"
        body_template: |
          Hi {{first_name}},

          I'll assume the timing isn't right — no worries at all.

          If building a more predictable pipeline ever becomes a priority
          for {{company_name}}, the door's open.

          Cheers,
          Ze Lu Sottomayor

# Vertical-specific context for AEC sub-segments
# The personalizer auto-detects the vertical from lead data and injects
# the matching context into the Claude prompt for targeted messaging.
aec_verticals:
  civil_site:
    match_keywords: ["civil", "site", "land development", "grading", "stormwater", "transportation"]
    buyer: "developers, general contractors, municipalities"
    pain: "missing developer projects before they hit public RFP — by the time you see the listing, relationships are already set"
    language: "projects, site plans, entitlements, land development, developer relationships"
  environmental:
    match_keywords: ["environmental", "remediation", "phase i", "phase ii", "compliance", "ehs", "hazardous"]
    buyer: "real estate developers, lenders, attorneys, property owners"
    pain: "waiting for Phase I calls instead of proactively reaching every developer and lender in your market"
    language: "due diligence, Phase I/II, site assessments, compliance, remediation"
  geotechnical:
    match_keywords: ["geotech", "geotechnical", "subsurface", "soil", "foundation", "drilling"]
    buyer: "developers, general contractors, civil engineers, architects"
    pain: "relying on the same 3-4 firms sending you work instead of being the first call on new developments"
    language: "geotech reports, subsurface investigation, foundation design, borings"
  architecture:
    match_keywords: ["architect", "architecture", "design", "planning", "multifamily"]
    buyer: "developers, property owners, tenant improvement clients"
    pain: "waiting on referrals for the next multifamily or commercial project instead of getting in front of developers early"
    language: "design, entitlements, project delivery, programming, schematic design"
  general_engineering:
    match_keywords: []
    buyer: "developers, property owners, general contractors"
    pain: "principals splitting time between project delivery and chasing new work"
    language: "projects, clients, winning work, pipeline"

# Personalization instructions for Claude AI
# NOTE: The actual prompt lives in src/outreach/personalize.py
# This section is kept for reference but the code prompt takes precedence.
personalization_instructions: |
  See src/outreach/personalize.py for the live Claude prompt.
  See docs/EMAIL_PLAYBOOK.md for campaign creation guidelines.

  Key rules:
  - personalized_opener: max 40 words, must reference concrete company details
  - specific_pain_point: max 40 words, anchored in vertical pain + buyer type
  - industry_specific_insight: max 30 words, non-obvious peer-level observation
  - suggested_subject: max 8 words, unique to this company
  - BANNED phrases: "I came across", "I was impressed by", "I noticed your company",
    "As a company that", "It's clear that", "In today's competitive landscape"
