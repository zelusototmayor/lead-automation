<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Outbound Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    :root {
      --bg:        #0c0e14;
      --bg2:       #12141c;
      --surface:   #171a25;
      --surface2:  #1c2030;
      --surface3:  #222638;
      --border:    #252a3a;
      --border-l:  #2f3548;
      --green:     #34d399;
      --green-dim: rgba(52,211,153,.10);
      --green-mid: rgba(52,211,153,.18);
      --blue:      #60a5fa;
      --blue-dim:  rgba(96,165,250,.10);
      --blue-mid:  rgba(96,165,250,.18);
      --amber:     #fbbf24;
      --amber-dim: rgba(251,191,36,.10);
      --amber-mid: rgba(251,191,36,.18);
      --teal:      #2dd4bf;
      --teal-dim:  rgba(45,212,191,.10);
      --purple:    #a78bfa;
      --purple-dim:rgba(167,139,250,.10);
      --rose:      #fb7185;
      --rose-dim:  rgba(251,113,133,.10);
      --tx1:       #f1f3f9;
      --tx2:       #8b92ab;
      --tx3:       #505672;
    }

    body { background: var(--bg); color: var(--tx1); min-height: 100vh; font-size: 14px; line-height: 1.5; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Top bar */
    #topbar {
      position: sticky; top: 0; z-index: 40;
      background: rgba(12,14,20,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bar-left { display: flex; align-items: center; gap: 12px; }
    .bar-brand { font-size: 14px; font-weight: 700; color: var(--tx1); letter-spacing: -0.02em; }
    .bar-sep { width: 1px; height: 20px; background: var(--border); }
    .bar-nav { font-size: 12px; font-weight: 600; color: var(--tx3); text-decoration: none; padding: 6px 12px; border-radius: 8px; transition: all 140ms; }
    .bar-nav:hover { color: var(--tx2); background: var(--surface2); }
    .bar-nav.active { color: var(--tx1); background: var(--surface2); }

    .bar-right { display: flex; align-items: center; gap: 16px; }
    .bar-stat { font-size: 12px; color: var(--tx3); }
    .bar-stat strong { color: var(--tx2); font-weight: 600; }

    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.35 } }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2.4s infinite; flex-shrink: 0; }

    /* Buttons */
    .btn {
      padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; transition: all 140ms;
    }
    .btn-primary { background: var(--green); color: #0a1a14; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost { background: var(--surface2); color: var(--tx2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-l); color: var(--tx1); }

    /* Card base */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: border-color 180ms;
    }
    .card:hover { border-color: var(--border-l); }

    /* Modal */
    #login-modal .mbox {
      background: var(--surface); border: 1px solid var(--border-l);
      border-radius: 20px; padding: 32px; width: 360px;
    }
    #login-modal input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--tx1); font-size: 13px;
      outline: none; transition: border-color 140ms;
    }
    #login-modal input:focus { border-color: var(--green); }
    #login-modal label { font-size: 11px; font-weight: 600; color: var(--tx2); display: block; margin-bottom: 6px; }

    /* ApexCharts overrides */
    .apexcharts-tooltip { background: var(--surface2) !important; border: 1px solid var(--border-l) !important; border-radius: 12px !important; }
    .apexcharts-tooltip-title { background: var(--surface3) !important; border-bottom: 1px solid var(--border) !important; color: var(--tx2) !important; font-size: 11px !important; }
    .apexcharts-xaxis-label, .apexcharts-yaxis-label { fill: var(--tx3) !important; font-size: 10px !important; }
    .apexcharts-gridline { stroke: rgba(37,42,58,.8) !important; }
    .apexcharts-legend-text { color: var(--tx2) !important; font-size: 11px !important; }

    /* Notification */
    #notif { font-size: 12px; font-weight: 500; }

    /* Hidden utility */
    .hidden { display: none !important; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="bar-left">
      <div class="live-dot"></div>
      <span class="bar-brand">Outbound Pipeline</span>
      <div class="bar-sep"></div>
      <a href="/" class="bar-nav {% block nav_dashboard %}{% endblock %}">Dashboard</a>
      <a href="/cold-calling" class="bar-nav {% block nav_cold_calling %}{% endblock %}">Cold Calling</a>
    </div>

    <div class="bar-right">
      {% if metrics %}
      <span class="bar-stat">Updated {{ metrics.last_updated }}</span>
      {% endif %}
      <button id="sync-btn" onclick="requireAuth(syncReplies)" class="btn btn-ghost">Sync Data</button>
      <div id="auth-status">
        <button onclick="showLoginModal()" class="btn btn-ghost" style="padding:6px 12px;">Login</button>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="hidden" style="position:fixed;inset:0;z-index:50;">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;">
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);" onclick="hideLoginModal()"></div>
      <div class="mbox" style="position:relative;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <span style="font-size:16px;font-weight:700;">Sign in</span>
          <button onclick="hideLoginModal()" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;">&#10005;</button>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div style="margin-bottom:14px;"><label>Username</label><input type="text" id="login-username" required placeholder="admin"></div>
          <div style="margin-bottom:18px;"><label>Password</label><input type="password" id="login-password" required placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"></div>
          <div id="login-error" class="hidden" style="font-size:12px;color:var(--rose);margin-bottom:14px;"></div>
          <button type="submit" id="login-submit" class="btn btn-primary" style="width:100%;padding:10px;">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <div id="notif" class="hidden" style="position:fixed;top:68px;right:24px;padding:10px 18px;border-radius:14px;z-index:50;background:var(--surface2);border:1px solid var(--border-l);max-width:300px;"></div>

  <main style="max-width:1400px;margin:0 auto;padding:24px 32px 80px;">
    {% block content %}{% endblock %}
  </main>

  <script>
  let authCredentials = null, pendingAction = null;
  (function(){ const s=sessionStorage.getItem('dAuth'); if(s){authCredentials=JSON.parse(s);updateAuth();} })();
  function updateAuth(){
    const el=document.getElementById('auth-status');
    if(authCredentials) el.innerHTML=`<span style="font-size:12px;color:var(--tx3)">${authCredentials.username}</span> <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:10px;margin-left:4px;">logout</button>`;
    else el.innerHTML=`<button onclick="showLoginModal()" class="btn btn-ghost" style="padding:6px 12px;">Login</button>`;
  }
  function showLoginModal(){ document.getElementById('login-modal').classList.remove('hidden'); document.getElementById('login-username').focus(); }
  function hideLoginModal(){ document.getElementById('login-modal').classList.add('hidden'); document.getElementById('login-error').classList.add('hidden'); document.getElementById('login-form').reset(); }
  async function handleLogin(e){
    e.preventDefault();
    const u=document.getElementById('login-username').value, p=document.getElementById('login-password').value;
    const errEl=document.getElementById('login-error'), btn=document.getElementById('login-submit');
    btn.disabled=true; btn.textContent='...';
    errEl.classList.add('hidden');
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      const d=await r.json();
      if(d.success){ authCredentials={username:u,password:p}; sessionStorage.setItem('dAuth',JSON.stringify(authCredentials)); updateAuth(); hideLoginModal(); if(pendingAction){pendingAction();pendingAction=null;} }
      else{ errEl.textContent=d.error||'Invalid credentials'; errEl.classList.remove('hidden'); }
    }catch(err){ errEl.textContent='Error: '+err.message; errEl.classList.remove('hidden'); }
    finally{ btn.disabled=false; btn.textContent='Sign in'; }
  }
  function logout(){ authCredentials=null; sessionStorage.removeItem('dAuth'); updateAuth(); notify('Logged out','ok'); }
  function requireAuth(fn){ if(authCredentials) fn(); else{ pendingAction=fn; showLoginModal(); } }
  function getAuthHeader(){ return authCredentials?{'Authorization':'Basic '+btoa(authCredentials.username+':'+authCredentials.password)}:{}; }
  function notify(msg,type){
    const n=document.getElementById('notif');
    n.textContent=msg;
    n.style.borderColor=type==='ok'?'rgba(52,211,153,.4)':'rgba(251,113,133,.4)';
    n.style.color=type==='ok'?'var(--green)':'var(--rose)';
    n.classList.remove('hidden');
    setTimeout(()=>n.classList.add('hidden'),5000);
  }
  async function syncReplies(){
    const btn=document.getElementById('sync-btn');
    btn.disabled=true; btn.textContent='Syncing...';
    try{
      const r=await fetch('/api/sync-replies',{method:'POST',headers:getAuthHeader()});
      const d=await r.json();
      if(r.ok){ notify(`Synced: ${d.replies_found} replies, ${d.crm_updated} updated`,'ok'); if(d.crm_updated>0) setTimeout(()=>location.reload(),1800); }
      else notify(d.error||'Sync failed','err');
    }catch(e){ notify('Sync failed: '+e.message,'err'); }
    finally{ btn.disabled=false; btn.textContent='Sync Data'; }
  }
  let cd=300; setInterval(()=>{ cd--; if(cd<=0) location.reload(); },1000);
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
